    actions/loadActiveProjects.ts: |
      import { action } from '@uibakery/data';

      function loadActiveProjects() {
        return action('loadActiveProjects', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ap.id,
              ap.project_name,
              ap.description,
              ap.funding_allocated,
              ap.budget_utilized,
              ap.start_date,
              ap.end_date,
              ap.status,
              ROUND((ap.budget_utilized / NULLIF(ap.funding_allocated, 0) * 100), 2) as budget_utilization_percent,
              COUNT(DISTINCT pm.id) as total_milestones,
              COUNT(DISTINCT CASE WHEN pm.status = 'completed' THEN pm.id END) as completed_milestones,
              COUNT(DISTINCT ptm.id) as team_size
            FROM active_projects ap
            LEFT JOIN project_milestones pm ON ap.id = pm.active_project_id
            LEFT JOIN project_team_members ptm ON ap.id = ptm.active_project_id
            WHERE 
              COALESCE({{params.status}}, '') = ''
              OR ap.status = {{params.status}}
            GROUP BY ap.id
            ORDER BY ap.created_at DESC;
          `,
        });
      }

      export default loadActiveProjects;
    actions/loadProjectDetails.ts: |
      import { action } from '@uibakery/data';

      function loadProjectDetails() {
        return action('loadProjectDetails', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ap.id,
              ap.project_name,
              ap.description,
              ap.funding_allocated,
              ap.budget_utilized,
              ap.start_date,
              ap.end_date,
              ap.status,
              ARRAY_AGG(DISTINCT jsonb_build_object(
                'id', pm.id,
                'title', pm.title,
                'description', pm.description,
                'due_date', pm.due_date,
                'status', pm.status,
                'deliverables', pm.deliverables
              )) FILTER (WHERE pm.id IS NOT NULL) as milestones,
              ARRAY_AGG(DISTINCT jsonb_build_object(
                'id', ptm.id,
                'name', ptm.name,
                'role', ptm.role,
                'email', ptm.email,
                'organization', ptm.organization
              )) FILTER (WHERE ptm.id IS NOT NULL) as team_members
            FROM active_projects ap
            LEFT JOIN project_milestones pm ON ap.id = pm.active_project_id
            LEFT JOIN project_team_members ptm ON ap.id = ptm.active_project_id
            WHERE ap.id = {{params.projectId}}::int
            GROUP BY ap.id;
          `,
        });
      }

      export default loadProjectDetails;
    actions/loadStudentProfiles.ts: |
      import { action } from '@uibakery/data';

      function loadStudentProfiles() {
        return action('loadStudentProfiles', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              sp.id,
              sp.name,
              sp.email,
              sp.degree_level,
              sp.field_of_study,
              sp.graduation_year,
              sp.gpa,
              sp.bio,
              sp.availability_status,
              u.name as university_name,
              ARRAY_AGG(DISTINCT ss.skill_name) FILTER (WHERE ss.skill_name IS NOT NULL) as skills,
              COUNT(DISTINCT spi.id) as project_count
            FROM student_profiles sp
            JOIN universities u ON sp.university_id = u.id
            LEFT JOIN student_skills ss ON sp.id = ss.student_profile_id
            LEFT JOIN student_project_involvement spi ON sp.id = spi.student_profile_id
            WHERE 
              (COALESCE({{params.searchQuery}}, '') = '' OR sp.name ILIKE {{ '%' + params.searchQuery + '%' }})
              AND (COALESCE({{params.degreeLevel}}, '') = '' OR sp.degree_level = {{params.degreeLevel}})
            GROUP BY sp.id, u.name
            ORDER BY sp.gpa DESC;
          `,
        });
      }

      export default loadStudentProfiles;
    actions/loadIPDisclosures.ts: |
      import { action } from '@uibakery/data';

      function loadIPDisclosures() {
        return action('loadIPDisclosures', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ip.id,
              ip.title,
              ip.description,
              ip.invention_category,
              ip.potential_applications,
              ip.commercial_potential,
              ip.status,
              ip.filing_date,
              ip.patent_number,
              ip.created_at,
              ap.project_name,
              ARRAY_AGG(jsonb_build_object(
                'name', ipc.contributor_name,
                'organization', ipc.organization,
                'ownership_percentage', ipc.ownership_percentage,
                'role', ipc.role
              )) as contributors
            FROM ip_disclosures ip
            JOIN active_projects ap ON ip.active_project_id = ap.id
            LEFT JOIN ip_contributors ipc ON ip.id = ipc.ip_disclosure_id
            WHERE 
              COALESCE({{params.status}}, '') = ''
              OR ip.status = {{params.status}}
            GROUP BY ip.id, ap.project_name
            ORDER BY ip.created_at DESC;
          `,
        });
      }

      export default loadIPDisclosures;
    components/ProjectWorkspace.tsx: >
      // Secure project workspace with tabs for different aspects


      import { useState } from 'react';

      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Tabs, TabsContent, TabsList, TabsTrigger } from
      '@/components/ui/tabs';

      import { Progress } from '@/components/ui/progress';

      import { Badge } from '@/components/ui/badge';

      import { Separator } from '@/components/ui/separator';

      import loadProjectDetailsAction from '@/actions/loadProjectDetails';

      import {
        Calendar,
        DollarSign,
        Users,
        TrendingUp,
        CheckCircle2,
        Clock,
        FileText,
        Lightbulb,
      } from 'lucide-react';


      type Milestone = {
        id: number;
        title: string;
        description: string;
        due_date: string;
        status: string;
        deliverables: string;
      };


      type TeamMember = {
        id: number;
        name: string;
        role: string;
        email: string;
        organization: string;
      };


      export function ProjectWorkspace() {
        const [selectedProjectId] = useState(1);
        const [project, loading] = useLoadAction(
          loadProjectDetailsAction,
          [],
          { projectId: selectedProjectId }
        );

        const projectData = project[0];

        const formatCurrency = (amount: number) => {
          return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 0,
          }).format(amount);
        };

        const getStatusColor = (status: string) => {
          switch (status) {
            case 'completed':
              return 'bg-green-100 text-green-800';
            case 'in_progress':
              return 'bg-blue-100 text-blue-800';
            case 'pending':
              return 'bg-gray-100 text-gray-800';
            case 'delayed':
              return 'bg-red-100 text-red-800';
            default:
              return 'bg-gray-100 text-gray-800';
          }
        };

        if (loading || !projectData) {
          return (
            <div className="p-8">
              <p className="text-gray-500">Loading project...</p>
            </div>
          );
        }

        const budgetPercent =
          (projectData.budget_utilized / projectData.funding_allocated) * 100;
        const milestones: Milestone[] = projectData.milestones || [];
        const teamMembers: TeamMember[] = projectData.team_members || [];
        const completedMilestones = milestones.filter((m) => m.status === 'completed').length;
        const milestonePercent = (completedMilestones / milestones.length) * 100;

        return (
          <div className="p-8">
            <div className="mb-6">
              <div className="flex items-start justify-between mb-4">
                <div>
                  <h1 className="text-3xl font-bold text-gray-900 mb-2">
                    {projectData.project_name}
                  </h1>
                  <p className="text-gray-600">{projectData.description}</p>
                </div>
                <Badge className={getStatusColor(projectData.status)}>
                  {projectData.status.replace('_', ' ')}
