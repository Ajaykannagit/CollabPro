    components/IPDisclosureForm.tsx: >
      // IP disclosure submission form


      import { useState } from 'react';

      import { useMutateAction } from '@uibakery/data';

      import { useForm } from 'react-hook-form';

      import { zodResolver } from '@hookform/resolvers/zod';

      import { z } from 'zod';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Input } from '@/components/ui/input';

      import { Textarea } from '@/components/ui/textarea';

      import { Label } from '@/components/ui/label';

      import { Select, SelectContent, SelectItem, SelectTrigger, SelectValue }
      from '@/components/ui/select';

      import createIPDisclosureAction from '@/actions/createIPDisclosure';

      import { useToast } from '@/hooks/use-toast';

      import { Toaster } from '@/components/ui/toaster';

      import { Lightbulb, CheckCircle } from 'lucide-react';


      const ipSchema = z.object({
        title: z.string().min(10, 'Title must be at least 10 characters'),
        description: z.string().min(50, 'Description must be at least 50 characters'),
        inventionCategory: z.string().min(1, 'Category is required'),
        potentialApplications: z.string().min(20, 'Please describe potential applications'),
        priorArtReferences: z.string(),
        commercialPotential: z.string().min(20, 'Please describe commercial potential'),
      });


      type IPFormData = z.infer<typeof ipSchema>;


      type IPDisclosureFormProps = {
        activeProjectId: number;
        onSuccess: () => void;
      };


      export function IPDisclosureForm({ activeProjectId, onSuccess }:
      IPDisclosureFormProps) {
        const [step, setStep] = useState(1);
        const [createDisclosure, submitting] = useMutateAction(createIPDisclosureAction);
        const { toast } = useToast();

        const form = useForm<IPFormData>({
          resolver: zodResolver(ipSchema),
          defaultValues: {
            title: '',
            description: '',
            inventionCategory: '',
            potentialApplications: '',
            priorArtReferences: '',
            commercialPotential: '',
          },
        });

        const onSubmit = async (data: IPFormData) => {
          try {
            await createDisclosure({
              activeProjectId,
              ...data,
            });
            toast({
              title: 'Success',
              description: 'IP disclosure submitted successfully',
            });
            onSuccess();
          } catch (error) {
            toast({
              title: 'Error',
              description: 'Failed to submit disclosure',
              variant: 'destructive',
            });
          }
        };

        const steps = [
          { id: 1, title: 'Basic Information' },
          { id: 2, title: 'Applications & Prior Art' },
          { id: 3, title: 'Commercial Assessment' },
        ];

        return (
          <>
            <div className="max-w-4xl mx-auto p-8">
              <div className="mb-8">
                <div className="flex items-center gap-3 mb-2">
                  <Lightbulb className="h-8 w-8 text-yellow-600" />
                  <h1 className="text-3xl font-bold text-gray-900">Submit IP Disclosure</h1>
                </div>
                <p className="text-gray-600">
                  Document your innovation for patent protection and licensing
                </p>
              </div>

              {/* Progress Steps */}
              <div className="mb-8">
                <div className="flex items-center justify-between">
                  {steps.map((s, idx) => (
                    <div key={s.id} className="flex items-center flex-1">
                      <div className="flex flex-col items-center">
                        <div
                          className={`h-10 w-10 rounded-full flex items-center justify-center font-semibold ${
                            step > s.id
                              ? 'bg-green-600 text-white'
                              : step === s.id
                              ? 'bg-blue-600 text-white'
                              : 'bg-gray-200 text-gray-600'
                          }`}
                        >
                          {step > s.id ? <CheckCircle className="h-5 w-5" /> : s.id}
                        </div>
                        <p className="text-sm font-medium text-gray-700 mt-2">{s.title}</p>
                      </div>
                      {idx < steps.length - 1 && (
                        <div
                          className={`flex-1 h-1 mx-4 ${
                            step > s.id ? 'bg-green-600' : 'bg-gray-200'
                          }`}
                        />
                      )}
                    </div>
                  ))}
                </div>
              </div>

              <Card>
                <CardContent className="p-6">
                  <form onSubmit={form.handleSubmit(onSubmit)} className="space-y-6">
                    {step === 1 && (
                      <>
                        <div className="grid gap-2">
                          <Label htmlFor="title">Invention Title</Label>
                          <Input
                            id="title"
                            placeholder="e.g., Real-time Vibration Analysis Algorithm"
                            {...form.register('title')}
                          />
                          {form.formState.errors.title && (
                            <p className="text-sm text-red-600">
                              {form.formState.errors.title.message}
                            </p>
                          )}
                        </div>

                        <div className="grid gap-2">
                          <Label htmlFor="inventionCategory">Invention Category</Label>
                          <Select
                            value={form.watch('inventionCategory')}
                            onValueChange={(value) => form.setValue('inventionCategory', value)}
                          >
                            <SelectTrigger>
                              <SelectValue placeholder="Select category" />
                            </SelectTrigger>
                            <SelectContent>
                              <SelectItem value="software">Software/Algorithm</SelectItem>
                              <SelectItem value="hardware">Hardware/Device</SelectItem>
                              <SelectItem value="process">Process/Method</SelectItem>
                              <SelectItem value="composition">Composition of Matter</SelectItem>
                              <SelectItem value="design">Design</SelectItem>
                            </SelectContent>
                          </Select>
                          {form.formState.errors.inventionCategory && (
                            <p className="text-sm text-red-600">
                              {form.formState.errors.inventionCategory.message}
                            </p>
                          )}
                        </div>

                        <div className="grid gap-2">
                          <Label htmlFor="description">Detailed Description</Label>
                          <Textarea
                            id="description"
                            placeholder="Provide a comprehensive description of your invention..."
                            rows={8}
                            {...form.register('description')}
                          />
                          {form.formState.errors.description && (
                            <p className="text-sm text-red-600">
                              {form.formState.errors.description.message}
                            </p>
                          )}
                        </div>
                      </>
                    )}

                    {step === 2 && (
                      <>
                        <div className="grid gap-2">
                          <Label htmlFor="potentialApplications">Potential Applications</Label>
                          <Textarea
                            id="potentialApplications"
                            placeholder="Describe potential use cases and applications..."
                            rows={6}
                            {...form.register('potentialApplications')}
                          />
                          {form.formState.errors.potentialApplications && (
                            <p className="text-sm text-red-600">
                              {form.formState.errors.potentialApplications.message}
                            </p>
                          )}
                        </div>

                        <div className="grid gap-2">
                          <Label htmlFor="priorArtReferences">
                            Prior Art References (Optional)
                          </Label>
                          <Textarea
                            id="priorArtReferences"
                            placeholder="List any existing patents, publications, or technologies related to your invention..."
                            rows={6}
                            {...form.register('priorArtReferences')}
                          />
                          <p className="text-xs text-gray-500">
                            This helps assess novelty and patentability
                          </p>
                        </div>
                      </>
                    )}

                    {step === 3 && (
                      <>
                        <div className="grid gap-2">
                          <Label htmlFor="commercialPotential">Commercial Potential</Label>
                          <Textarea
                            id="commercialPotential"
                            placeholder="Describe market opportunity, competitive advantage, and revenue potential..."
                            rows={8}
                            {...form.register('commercialPotential')}
                          />
                          {form.formState.errors.commercialPotential && (
                            <p className="text-sm text-red-600">
                              {form.formState.errors.commercialPotential.message}
                            </p>
                          )}
                        </div>

                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                          <h4 className="font-semibold text-blue-900 mb-2">Next Steps</h4>
                          <ul className="text-sm text-blue-800 space-y-1">
                            <li>• Legal team will review within 5 business days</li>
                            <li>• Prior art search will be conducted</li>
                            <li>• Patent attorney will assess patentability</li>
                            <li>• You'll be notified of filing decision</li>
                          </ul>
                        </div>
                      </>
                    )}

                    <div className="flex gap-3 pt-4 border-t">
                      {step > 1 && (
                        <Button
                          type="button"
                          variant="outline"
                          onClick={() => setStep(step - 1)}
                        >
                          Previous
                        </Button>
                      )}
                      {step < 3 ? (
                        <Button
                          type="button"
                          onClick={() => setStep(step + 1)}
                          className="ml-auto"
                        >
                          Next Step
                        </Button>
                      ) : (
                        <Button type="submit" disabled={submitting} className="ml-auto">
                          {submitting ? 'Submitting...' : 'Submit IP Disclosure'}
                        </Button>
                      )}
                    </div>
                  </form>
                </CardContent>
              </Card>
            </div>
            <Toaster />
          </>
        );
      }
    components/LicensingMarketplace.tsx: >
      // Licensing marketplace for IP commercialization


      import { useState } from 'react';

      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Badge } from '@/components/ui/badge';

      import { Input } from '@/components/ui/input';

      import loadLicensingOpportunitiesAction from
      '@/actions/loadLicensingOpportunities';

      import { formatINRCompact, usdToINR } from '@/lib/currency';

      import { Store, Search, TrendingUp, Eye, MessageCircle } from
      'lucide-react';


      type LicensingOpportunity = {
        id: number;
        anonymized_title: string;
        anonymized_description: string;
        licensing_type: string;
        asking_price: number;
        industry_sectors: string;
        inquiries_count: number;
        created_at: string;
        invention_category: string;
        ip_status: string;
      };


      export function LicensingMarketplace() {
        const [searchQuery, setSearchQuery] = useState('');
        const [opportunities, loading, error] = useLoadAction(
          loadLicensingOpportunitiesAction,
          [],
          { industrySector: searchQuery || null }
        );

        return (
          <div className="p-8">
            <div className="mb-6">
              <div className="flex items-center gap-3 mb-2">
                <Store className="h-8 w-8 text-teal-600" />
                <h1 className="text-3xl font-bold text-gray-900">Licensing Marketplace</h1>
              </div>
              <p className="text-gray-600">Discover patented technologies available for licensing</p>
            </div>

            {/* Search */}
            <Card className="mb-6">
              <CardContent className="p-4">
                <div className="relative">
                  <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400" />
                  <Input
                    placeholder="Search by industry sector..."
                    className="pl-10"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </CardContent>
            </Card>

            {/* Opportunities Grid */}
            {loading && (
              <div className="text-center py-12">
                <p className="text-gray-500">Loading opportunities...</p>
              </div>
            )}

            {error && (
              <Card>
                <CardContent className="p-6">
                  <p className="text-red-600">Error: {error.message}</p>
                </CardContent>
              </Card>
            )}

            {!loading && !error && (
              <div className="grid md:grid-cols-2 gap-6">
                {opportunities.map((opp: LicensingOpportunity) => (
                  <Card key={opp.id} className="hover:shadow-lg transition-shadow">
                    <CardHeader>
                      <div className="flex items-start justify-between mb-2">
                        <Badge variant="secondary">{opp.invention_category}</Badge>
                        <Badge className="bg-teal-100 text-teal-800">
                          {opp.licensing_type}
                        </Badge>
                      </div>
                      <CardTitle className="text-xl">{opp.anonymized_title}</CardTitle>
                    </CardHeader>
                    <CardContent className="space-y-4">
                      <p className="text-sm text-gray-700 leading-relaxed">
                        {opp.anonymized_description}
                      </p>

                      <div className="flex items-center gap-3 text-sm text-gray-600">
                        <div className="flex items-center gap-1">
                          <Eye className="h-4 w-4" />
                          <span>{opp.inquiries_count} inquiries</span>
                        </div>
                        <span>•</span>
                        <Badge variant="outline" className="text-xs">
                          {opp.ip_status.replace('_', ' ')}
                        </Badge>
                      </div>

                      <div className="bg-gray-50 rounded-lg p-4">
                        <p className="text-xs text-gray-600 mb-1">Asking Price</p>
                        <p className="text-2xl font-bold text-teal-600">
                          {formatINRCompact(usdToINR(opp.asking_price))}
                        </p>
                      </div>

                      <div>
                        <p className="text-xs font-semibold text-gray-700 mb-2">
                          Applicable Industries
                        </p>
                        <div className="flex flex-wrap gap-1">
                          {opp.industry_sectors.split(', ').slice(0, 3).map((sector, idx) => (
                            <Badge key={idx} variant="outline" className="text-xs">
                              {sector}
                            </Badge>
                          ))}
                        </div>
                      </div>

                      <div className="flex gap-2 pt-4 border-t">
                        <Button size="sm" className="flex-1">
                          <MessageCircle className="h-4 w-4 mr-2" />
                          Express Interest
                        </Button>
                        <Button size="sm" variant="outline">
                          Details
                        </Button>
                      </div>
                    </CardContent>
                  </Card>
                ))}
              </div>
            )}

            {!loading && !error && opportunities.length === 0 && (
              <Card>
                <CardContent className="p-12 text-center">
                  <Store className="h-12 w-12 text-gray-400 mx-auto mb-4" />
                  <h3 className="text-lg font-semibold text-gray-900 mb-2">
                    No opportunities found
                  </h3>
                  <p className="text-gray-600">Try adjusting your search</p>
                </CardContent>
              </Card>
            )}
          </div>
        );
      }
    components/AnalyticsDashboard.tsx: >
      // Platform analytics and reporting dashboard


      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import loadPlatformAnalyticsAction from '@/actions/loadPlatformAnalytics';

      import { formatINRCompact, usdToINR } from '@/lib/currency';

      import { BarChart3, TrendingUp, Users, Briefcase, DollarSign, Award,
      Target } from 'lucide-react';


      export function AnalyticsDashboard() {
        const [analytics] = useLoadAction(loadPlatformAnalyticsAction, [], { category: null });

        const getMetric = (name: string) => {
          const metric = analytics.find((m: any) => m.metric_name === name);
          return metric?.metric_value || 0;
        };

        const metrics = [
          {
            title: 'Total Collaborations',
            value: getMetric('total_collaborations'),
            icon: Briefcase,
            color: 'text-blue-600 bg-blue-100',
            change: '+12%',
          },
          {
            title: 'Active Projects',
            value: getMetric('active_projects'),
            icon: Target,
            color: 'text-green-600 bg-green-100',
            change: '+8%',
          },
          {
            title: 'Avg Project Value',
            value: formatINRCompact(usdToINR(getMetric('avg_project_value'))),
            icon: DollarSign,
            color: 'text-purple-600 bg-purple-100',
            change: '+15%',
          },
          {
            title: 'Success Rate',
            value: `${getMetric('success_rate')}%`,
            icon: TrendingUp,
            color: 'text-teal-600 bg-teal-100',
            change: '+2.4%',
          },
          {
            title: 'IP Disclosures',
            value: getMetric('total_ip_disclosures'),
            icon: Award,
            color: 'text-yellow-600 bg-yellow-100',
            change: '+22%',
          },
          {
            title: 'Student Placements',
