    actions/loadResearchProjects.ts: |
      import { action } from '@uibakery/data';

      function loadResearchProjects() {
        return action('loadResearchProjects', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              rp.id,
              rp.title,
              rp.description,
              rp.funding_needed,
              rp.trl_level,
              rp.status,
              rp.team_lead,
              rp.team_size,
              rp.publications_count,
              u.name as university_name,
              u.location as university_location,
              ARRAY_AGG(ea.name) as expertise_areas
            FROM research_projects rp
            JOIN universities u ON rp.university_id = u.id
            LEFT JOIN research_project_expertise rpe ON rp.id = rpe.research_project_id
            LEFT JOIN expertise_areas ea ON rpe.expertise_area_id = ea.id
            WHERE 
              rp.status = 'active'
              AND (COALESCE({{params.searchQuery}}, '') = '' OR rp.title ILIKE {{ '%' + params.searchQuery + '%' }})
            GROUP BY rp.id, u.name, u.location
            ORDER BY rp.created_at DESC;
          `,
        });
      }

      export default loadResearchProjects;
    actions/loadExpertiseAreas.ts: |
      import { action } from '@uibakery/data';

      function loadExpertiseAreas() {
        return action('loadExpertiseAreas', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT id, name, description
            FROM expertise_areas
            ORDER BY name ASC;
          `,
        });
      }

      export default loadExpertiseAreas;
    components/ProjectDiscovery.tsx: >
      // Project Discovery page with filterable research projects grid


      import { useState } from 'react';

      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import loadResearchProjectsAction from '@/actions/loadResearchProjects';

      import { Search, Briefcase, DollarSign, TrendingUp } from 'lucide-react';

      import { ProjectDetailModal } from '@/components/ProjectDetailModal';

      import { formatINRCompact, usdToINR } from '@/lib/currency';


      type ResearchProject = {
        id: number;
        title: string;
        description: string;
        funding_needed: number;
        trl_level: number;
        status: string;
        team_lead: string;
        team_size: number;
        publications_count: number;
        university_name: string;
        university_location: string;
        expertise_areas: string[];
      };


      export function ProjectDiscovery() {
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedProject, setSelectedProject] = useState<ResearchProject | null>(null);
        const [projects, loading, error] = useLoadAction(
          loadResearchProjectsAction,
          [],
          { searchQuery: searchQuery || null }
        );

        const formatCurrency = (amount: number) => {
          return formatINRCompact(usdToINR(amount));
        };

        return (
          <div className="p-8">
            <div className="mb-6">
              <h1 className="text-3xl font-bold text-gray-900 mb-2">Research Projects</h1>
              <p className="text-gray-600">Discover cutting-edge university research available for collaboration</p>
            </div>

            {/* Search Bar */}
            <Card className="mb-6">
              <CardContent className="p-4">
                <div className="flex gap-3">
                  <div className="flex-1 relative">
                    <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400" />
                    <input
                      type="text"
                      placeholder="Search projects by title..."
                      className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                </div>
              </CardContent>
            </Card>

            {/* Projects Grid */}
            {loading && (
              <div className="text-center py-12">
                <p className="text-gray-500">Loading research projects...</p>
              </div>
            )}

            {error && (
              <Card>
                <CardContent className="p-6">
                  <p className="text-red-600">Error loading projects: {error.message}</p>
                </CardContent>
              </Card>
            )}

            {!loading && !error && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {projects.map((project: ResearchProject) => (
                  <Card key={project.id} className="hover:shadow-lg transition-shadow cursor-pointer">
                    <CardHeader>
                      <CardTitle className="text-lg line-clamp-2">{project.title}</CardTitle>
                      <div className="flex items-center gap-2 text-sm text-gray-600 mt-2">
                        <Briefcase className="h-4 w-4" />
                        <span>{project.university_name}</span>
                      </div>
                    </CardHeader>
                    <CardContent>
                      <p className="text-sm text-gray-600 line-clamp-3 mb-4">
                        {project.description}
                      </p>

                      <div className="space-y-2 mb-4">
                        <div className="flex items-center justify-between text-sm">
                          <span className="text-gray-500 flex items-center gap-1">
                            <DollarSign className="h-3 w-3" />
                            Funding Needed
                          </span>
                          <span className="font-semibold text-gray-900">
                            {formatCurrency(project.funding_needed)}
                          </span>
                        </div>
                        <div className="flex items-center justify-between text-sm">
                          <span className="text-gray-500 flex items-center gap-1">
                            <TrendingUp className="h-3 w-3" />
                            TRL Level
                          </span>
                          <span className="font-semibold text-gray-900">
                            {project.trl_level}/9
                          </span>
                        </div>
                      </div>

                      <div className="flex flex-wrap gap-1 mb-4">
                        {project.expertise_areas?.slice(0, 3).map((area, idx) => (
                          <span
                            key={idx}
                            className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full"
                          >
                            {area}
                          </span>
                        ))}
                        {project.expertise_areas?.length > 3 && (
                          <span className="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-full">
                            +{project.expertise_areas.length - 3} more
                          </span>
                        )}
                      </div>

                      <Button
                        className="w-full"
                        size="sm"
                        onClick={() => setSelectedProject(project)}
                      >
                        View Details
                      </Button>
                    </CardContent>
                  </Card>
                ))}
              </div>
            )}

            {!loading && !error && projects.length === 0 && (
              <Card>
                <CardContent className="p-12 text-center">
                  <Briefcase className="h-12 w-12 text-gray-400 mx-auto mb-4" />
                  <h3 className="text-lg font-semibold text-gray-900 mb-2">No projects found</h3>
                  <p className="text-gray-600">Try adjusting your search criteria</p>
                </CardContent>
              </Card>
            )}

            {selectedProject && (
              <ProjectDetailModal
                project={selectedProject}
                onClose={() => setSelectedProject(null)}
              />
            )}
          </div>
        );
      }
    components/ProjectDetailModal.tsx: >
      // Project detail modal showing full information


      import { useState } from 'react';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { X, Users, BookOpen, MapPin, DollarSign, TrendingUp } from
      'lucide-react';

      import { CollaborationRequestForm } from
      '@/components/CollaborationRequestForm';

      import { formatINR, usdToINR } from '@/lib/currency';


      type ResearchProject = {
        id: number;
        title: string;
        description: string;
        funding_needed: number;
        trl_level: number;
        status: string;
        team_lead: string;
        team_size: number;
        publications_count: number;
        university_name: string;
        university_location: string;
        expertise_areas: string[];
      };


      type ProjectDetailModalProps = {
        project: ResearchProject;
        onClose: () => void;
      };


      export function ProjectDetailModal({ project, onClose }:
      ProjectDetailModalProps) {
        const [showRequestForm, setShowRequestForm] = useState(false);

        const formatCurrency = (amount: number) => {
          return formatINR(usdToINR(amount));
        };

        if (showRequestForm) {
          return (
            <CollaborationRequestForm
              projectId={project.id}
              projectTitle={project.title}
              onClose={() => setShowRequestForm(false)}
              onSuccess={onClose}
