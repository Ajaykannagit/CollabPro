    components/CollaborationRequestForm.tsx: >
      // Form for initiating collaboration requests


      import { useMutateAction } from '@uibakery/data';

      import { useForm } from 'react-hook-form';

      import { zodResolver } from '@hookform/resolvers/zod';

      import { z } from 'zod';

      import {
        Dialog,
        DialogContent,
        DialogHeader,
        DialogTitle,
        DialogDescription,
      } from '@/components/ui/dialog';

      import { Button } from '@/components/ui/button';

      import { Input } from '@/components/ui/input';

      import { Textarea } from '@/components/ui/textarea';

      import { Label } from '@/components/ui/label';

      import createCollaborationRequestAction from
      '@/actions/createCollaborationRequest';

      import { useToast } from '@/hooks/use-toast';

      import { Toaster } from '@/components/ui/toaster';


      const requestSchema = z.object({
        projectBrief: z.string().min(50, 'Project brief must be at least 50 characters'),
        budgetProposed: z.string().min(1, 'Budget is required'),
        timelineProposed: z.string().min(1, 'Timeline is required'),
      });


      type RequestFormData = z.infer<typeof requestSchema>;


      type CollaborationRequestFormProps = {
        projectId: number;
        projectTitle: string;
        onClose: () => void;
        onSuccess: () => void;
      };


      export function CollaborationRequestForm({
        projectId,
        projectTitle,
        onClose,
        onSuccess,
      }: CollaborationRequestFormProps) {
        const [createRequest, isSubmitting] = useMutateAction(createCollaborationRequestAction);
        const { toast } = useToast();

        const form = useForm<RequestFormData>({
          resolver: zodResolver(requestSchema),
          defaultValues: {
            projectBrief: '',
            budgetProposed: '',
            timelineProposed: '',
          },
        });

        const onSubmit = async (data: RequestFormData) => {
          try {
            await createRequest({
              corporatePartnerId: 1,
              researchProjectId: projectId,
              industryChallengeId: null,
              projectBrief: data.projectBrief,
              budgetProposed: parseFloat(data.budgetProposed),
              timelineProposed: data.timelineProposed,
            });
            toast({
              title: 'Success',
              description: 'Collaboration request sent successfully',
            });
            onSuccess();
          } catch (error) {
            toast({
              title: 'Error',
              description: 'Failed to send request',
              variant: 'destructive',
            });
          }
        };

        return (
          <>
            <Dialog open onOpenChange={onClose}>
              <DialogContent className="max-w-2xl">
                <DialogHeader>
                  <DialogTitle className="text-2xl">Initiate Collaboration Request</DialogTitle>
                  <DialogDescription>Project: {projectTitle}</DialogDescription>
                </DialogHeader>

                <form onSubmit={form.handleSubmit(onSubmit)} className="space-y-6">
                  <div className="grid gap-2">
                    <Label htmlFor="projectBrief">Project Brief</Label>
                    <Textarea
                      id="projectBrief"
                      placeholder="Describe your collaboration proposal, objectives, and expected outcomes..."
                      rows={8}
                      {...form.register('projectBrief')}
                    />
                    {form.formState.errors.projectBrief && (
                      <p className="text-sm text-red-600">
                        {form.formState.errors.projectBrief.message}
                      </p>
                    )}
                  </div>

                  <div className="grid gap-2">
                    <Label htmlFor="budgetProposed">Proposed Budget ($)</Label>
                    <Input
                      id="budgetProposed"
                      type="number"
                      placeholder="850000"
                      {...form.register('budgetProposed')}
                    />
                    {form.formState.errors.budgetProposed && (
                      <p className="text-sm text-red-600">
                        {form.formState.errors.budgetProposed.message}
                      </p>
                    )}
                  </div>

                  <div className="grid gap-2">
                    <Label htmlFor="timelineProposed">Proposed Timeline</Label>
                    <Input
                      id="timelineProposed"
                      placeholder="e.g., 24 months with 6-month pilot phase"
                      {...form.register('timelineProposed')}
                    />
                    {form.formState.errors.timelineProposed && (
                      <p className="text-sm text-red-600">
                        {form.formState.errors.timelineProposed.message}
                      </p>
                    )}
                  </div>

                  <div className="flex gap-3 pt-4 border-t">
                    <Button type="submit" disabled={isSubmitting} className="flex-1">
                      {isSubmitting ? 'Sending...' : 'Send Request'}
                    </Button>
                    <Button type="button" variant="outline" onClick={onClose}>
                      Cancel
                    </Button>
                  </div>
                </form>
              </DialogContent>
            </Dialog>
            <Toaster />
          </>
        );
      }
    components/NotificationsPanel.tsx: >
      // Notifications panel showing pending collaboration requests


      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Badge } from '@/components/ui/badge';

      import loadCollaborationRequestsAction from
      '@/actions/loadCollaborationRequests';

      import { Bell, Clock, Building2, Briefcase } from 'lucide-react';


      type CollaborationRequest = {
        id: number;
        project_brief: string;
        budget_proposed: number;
        timeline_proposed: string;
        status: string;
        created_at: string;
        company_name: string;
        industry: string;
        project_title: string;
        university_name: string;
        challenge_title: string;
      };


      export function NotificationsPanel() {
        const [requests, loading, error] = useLoadAction(
          loadCollaborationRequestsAction,
          [],
          { status: 'pending' }
        );

        const formatCurrency = (amount: number) => {
          return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 0,
          }).format(amount);
        };

        const getStatusColor = (status: string) => {
          switch (status) {
            case 'pending':
              return 'bg-yellow-100 text-yellow-800';
            case 'accepted':
              return 'bg-green-100 text-green-800';
            case 'rejected':
              return 'bg-red-100 text-red-800';
            default:
              return 'bg-gray-100 text-gray-800';
          }
        };

        return (
          <div className="p-8">
            <div className="mb-6 flex items-center gap-3">
              <Bell className="h-8 w-8 text-blue-600" />
              <div>
                <h1 className="text-3xl font-bold text-gray-900">Notifications</h1>
                <p className="text-gray-600">Pending collaboration requests</p>
              </div>
            </div>

            {loading && (
              <div className="text-center py-12">
                <p className="text-gray-500">Loading notifications...</p>
              </div>
            )}

            {error && (
              <Card>
                <CardContent className="p-6">
                  <p className="text-red-600">Error: {error.message}</p>
                </CardContent>
              </Card>
            )}

            {!loading && !error && (
              <div className="space-y-4">
                {requests.map((request: CollaborationRequest) => (
                  <Card key={request.id} className="hover:shadow-md transition-shadow">
                    <CardHeader className="pb-3">
                      <div className="flex items-start justify-between">
                        <div className="flex-1">
                          <div className="flex items-center gap-2 mb-2">
                            <CardTitle className="text-lg">Collaboration Request</CardTitle>
                            <Badge className={getStatusColor(request.status)}>
                              {request.status}
                            </Badge>
                          </div>
                          <div className="flex items-center gap-3 text-sm text-gray-600">
                            <div className="flex items-center gap-1">
                              <Building2 className="h-3 w-3" />
                              <span>{request.company_name}</span>
                            </div>
                            {request.industry && (
                              <>
                                <span>•</span>
                                <span>{request.industry}</span>
                              </>
                            )}
                            <span>•</span>
                            <div className="flex items-center gap-1">
                              <Clock className="h-3 w-3" />
                              <span>{new Date(request.created_at).toLocaleDateString()}</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </CardHeader>
                    <CardContent>
                      {request.project_title && (
                        <div className="mb-3 p-3 bg-blue-50 rounded-md">
                          <div className="flex items-center gap-2 mb-1">
                            <Briefcase className="h-4 w-4 text-blue-600" />
                            <p className="text-sm font-semibold text-blue-900">
                              Research Project
                            </p>
                          </div>
                          <p className="text-sm text-gray-700">{request.project_title}</p>
                          {request.university_name && (
                            <p className="text-xs text-gray-600 mt-1">
                              {request.university_name}
                            </p>
                          )}
                        </div>
                      )}

                      <div className="mb-4">
                        <p className="text-sm font-semibold text-gray-700 mb-2">Project Brief</p>
                        <p className="text-sm text-gray-600 leading-relaxed">
                          {request.project_brief}
                        </p>
                      </div>

                      <div className="grid grid-cols-2 gap-4 mb-4 p-3 bg-gray-50 rounded-md">
                        <div>
                          <p className="text-xs text-gray-600 mb-1">Proposed Budget</p>
                          <p className="font-semibold text-gray-900">
                            {formatCurrency(request.budget_proposed)}
                          </p>
                        </div>
                        <div>
                          <p className="text-xs text-gray-600 mb-1">Proposed Timeline</p>
                          <p className="font-semibold text-gray-900">
                            {request.timeline_proposed}
                          </p>
                        </div>
                      </div>

                      <div className="flex gap-2">
                        <Button size="sm" className="flex-1">
                          Accept Request
                        </Button>
                        <Button size="sm" variant="outline">
                          Review Details
                        </Button>
                        <Button size="sm" variant="destructive">
                          Decline
                        </Button>
                      </div>
                    </CardContent>
                  </Card>
                ))}
              </div>
            )}

            {!loading && !error && requests.length === 0 && (
              <Card>
                <CardContent className="p-12 text-center">
                  <Bell className="h-12 w-12 text-gray-400 mx-auto mb-4" />
                  <h3 className="text-lg font-semibold text-gray-900 mb-2">No pending requests</h3>
                  <p className="text-gray-600">You're all caught up!</p>
                </CardContent>
              </Card>
            )}
          </div>
        );
      }
