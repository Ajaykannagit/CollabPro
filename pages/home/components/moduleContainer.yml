    app/app.tsx: >
      // Main application entry point for CollabSync Pro


      import { useState } from 'react';

      import { Button } from '@/components/ui/button';

      import { Badge } from '@/components/ui/badge';

      import { Home, Briefcase, Building2, Sparkles, User, Bell, Target } from
      'lucide-react';

      import { ProjectDiscovery } from '@/components/ProjectDiscovery';

      import { IndustryChallengesBoard } from
      '@/components/IndustryChallengesBoard';

      import { AIMatchmaking } from '@/components/AIMatchmaking';

      import { UniversityProfiles } from '@/components/UniversityProfiles';

      import { NotificationsPanel } from '@/components/NotificationsPanel';

      import { DashboardOverview } from '@/components/DashboardOverview';

      import { ProjectWorkspace } from '@/components/ProjectWorkspace';

      import { TalentShowcase } from '@/components/TalentShowcase';

      import { IPPortfolio } from '@/components/IPPortfolio';

      import { NegotiationWorkspace } from '@/components/NegotiationWorkspace';

      import { AgreementGenerator } from '@/components/AgreementGenerator';

      import { IPDisclosureForm } from '@/components/IPDisclosureForm';

      import { LicensingMarketplace } from '@/components/LicensingMarketplace';

      import { AnalyticsDashboard } from '@/components/AnalyticsDashboard';


      type NavSection = 'dashboard' | 'projects' | 'challenges' | 'partners' |
      'matchmaking' | 'notifications' | 'profile' | 'workspace' | 'talent' |
      'ip' | 'negotiate' | 'agreement' | 'ipdisclosure' | 'licensing' |
      'analytics';


      function App() {
        const [activeSection, setActiveSection] = useState<NavSection>('dashboard');

        const navItems = [
          { id: 'dashboard' as NavSection, label: 'Dashboard', icon: Home },
          { id: 'projects' as NavSection, label: 'Research Projects', icon: Briefcase },
          { id: 'challenges' as NavSection, label: 'Industry Challenges', icon: Target },
          { id: 'partners' as NavSection, label: 'Universities', icon: Building2 },
          { id: 'matchmaking' as NavSection, label: 'AI Matchmaking', icon: Sparkles },
          { id: 'notifications' as NavSection, label: 'Notifications', icon: Bell, badge: 2 },
        ];

        const secondaryItems = [
          { id: 'workspace' as NavSection, label: 'Project Workspace', icon: Target },
          { id: 'talent' as NavSection, label: 'Talent Showcase', icon: User },
          { id: 'ip' as NavSection, label: 'IP Portfolio', icon: Briefcase },
          { id: 'negotiate' as NavSection, label: 'Negotiation', icon: Target },
          { id: 'agreement' as NavSection, label: 'Agreement', icon: Target },
          { id: 'ipdisclosure' as NavSection, label: 'Submit IP', icon: Target },
          { id: 'licensing' as NavSection, label: 'Licensing Market', icon: Target },
          { id: 'analytics' as NavSection, label: 'Analytics', icon: Target },
        ];

        return (
          <div className="flex h-screen bg-gray-50">
            {/* Sidebar Navigation */}
            <div className="w-64 bg-white border-r border-gray-200 flex flex-col">
              <div className="p-6 border-b border-gray-200">
                <div className="flex items-center gap-2 mb-1">
                  <div className="h-8 w-8 bg-gradient-to-br from-purple-600 to-blue-600 rounded-lg flex items-center justify-center">
                    <Sparkles className="h-5 w-5 text-white" />
                  </div>
                  <h1 className="text-xl font-bold text-gray-900">CollabSync Pro</h1>
                </div>
                <p className="text-xs text-gray-500 mt-1">Industry-Academia Portal</p>
              </div>
              
              <nav className="flex-1 p-4 space-y-4">
                <div className="space-y-1">
                  {navItems.map((item) => {
                    const Icon = item.icon;
                    return (
                      <Button
                        key={item.id}
                        variant={activeSection === item.id ? 'default' : 'ghost'}
                        className="w-full justify-start relative"
                        onClick={() => setActiveSection(item.id)}
                      >
                        <Icon className="h-4 w-4 mr-3" />
                        {item.label}
                        {item.badge && (
                          <Badge className="ml-auto" variant="destructive">
                            {item.badge}
                          </Badge>
                        )}
                      </Button>
                    );
                  })}
                </div>
                <div className="pt-4 border-t">
                  <p className="text-xs font-semibold text-gray-500 px-3 mb-2">ADVANCED</p>
                  <div className="space-y-1">
                    {secondaryItems.map((item) => {
                      const Icon = item.icon;
                      return (
                        <Button
                          key={item.id}
                          variant={activeSection === item.id ? 'default' : 'ghost'}
                          className="w-full justify-start"
                          onClick={() => setActiveSection(item.id)}
                        >
                          <Icon className="h-4 w-4 mr-3" />
                          {item.label}
                        </Button>
                      );
                    })}
                  </div>
                </div>
              </nav>

              <div className="p-4 border-t border-gray-200">
                <div className="flex items-center gap-3">
                  <div className="h-10 w-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-semibold">
                    NH
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-gray-900 truncate">NHSRCL</p>
                    <p className="text-xs text-gray-500">Corporate Partner</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Main Content */}
            <div className="flex-1 overflow-auto">
              {activeSection === 'dashboard' && <DashboardOverview />}
              {activeSection === 'projects' && <ProjectDiscovery />}
              {activeSection === 'challenges' && <IndustryChallengesBoard />}
              {activeSection === 'partners' && <UniversityProfiles />}
              {activeSection === 'matchmaking' && <AIMatchmaking />}
              {activeSection === 'notifications' && <NotificationsPanel />}
              {activeSection === 'workspace' && <ProjectWorkspace />}
              {activeSection === 'talent' && <TalentShowcase />}
              {activeSection === 'ip' && <IPPortfolio />}
              {activeSection === 'negotiate' && <NegotiationWorkspace collaborationRequestId={1} />}
              {activeSection === 'agreement' && <AgreementGenerator collaborationRequestId={1} />}
              {activeSection === 'ipdisclosure' && (
                <IPDisclosureForm activeProjectId={1} onSuccess={() => setActiveSection('ip')} />
              )}
              {activeSection === 'licensing' && <LicensingMarketplace />}
              {activeSection === 'analytics' && <AnalyticsDashboard />}
              {activeSection === 'profile' && (
                <div className="p-8">
                  <div className="max-w-2xl">
                    <h1 className="text-3xl font-bold text-gray-900 mb-2">Profile Settings</h1>
                    <p className="text-gray-600 mb-6">Manage your account and preferences</p>
                    <div className="bg-white rounded-lg border p-6">
                      <p className="text-gray-600">Profile settings coming soon...</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }


      export default App;
    components/ui/button.tsx: |+
      import * as React from "react"
      import { Slot } from "@radix-ui/react-slot"
      import { cva, type VariantProps } from "class-variance-authority"

      import { cn } from "@/lib/utils"

      const buttonVariants = cva(
        "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0",
        {
          variants: {
            variant: {
              default:
                "bg-primary text-primary-foreground shadow hover:bg-primary/90",
              destructive:
                "bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90",
              outline:
                "border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground",
              secondary:
                "bg-secondary text-secondary-foreground shadow-sm hover:bg-secondary/80",
              ghost: "hover:bg-accent hover:text-accent-foreground",
              link: "text-primary underline-offset-4 hover:underline",
            },
            size: {
              default: "h-9 px-4 py-2",
              sm: "h-8 rounded-md px-3 text-xs",
              lg: "h-10 rounded-md px-8",
              icon: "h-9 w-9",
            },
          },
          defaultVariants: {
            variant: "default",
            size: "default",
          },
        }
      )

      export interface ButtonProps
        extends React.ButtonHTMLAttributes<HTMLButtonElement>,
          VariantProps<typeof buttonVariants> {
        asChild?: boolean
      }

      const Button = React.forwardRef<HTMLButtonElement, ButtonProps>(
        ({ className, variant, size, asChild = false, ...props }, ref) => {
          const Comp = asChild ? Slot : "button"
          return (
            <Comp
              className={cn(buttonVariants({ variant, size, className }))}
              ref={ref}
              {...props}
            />
          )
        }
      )
      Button.displayName = "Button"

      export { Button, buttonVariants }


