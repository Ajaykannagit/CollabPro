    components/ui/form.tsx: >+
      import * as React from "react"

      import * as LabelPrimitive from "@radix-ui/react-label"

      import { Slot } from "@radix-ui/react-slot"

      import {
        Controller,
        FormProvider,
        useFormContext,
        type ControllerProps,
        type FieldPath,
        type FieldValues,
      } from "react-hook-form"


      import { cn } from "@/lib/utils"

      import { Label } from "@/components/ui/label"


      const Form = FormProvider


      type FormFieldContextValue<
        TFieldValues extends FieldValues = FieldValues,
        TName extends FieldPath<TFieldValues> = FieldPath<TFieldValues>
      > = {
        name: TName
      }


      const FormFieldContext = React.createContext<FormFieldContextValue |
      null>(null)


      const FormField = <
        TFieldValues extends FieldValues = FieldValues,
        TName extends FieldPath<TFieldValues> = FieldPath<TFieldValues>
      >({
        ...props
      }: ControllerProps<TFieldValues, TName>) => {
        return (
          <FormFieldContext.Provider value={{ name: props.name }}>
            <Controller {...props} />
          </FormFieldContext.Provider>
        )
      }


      const useFormField = () => {
        const fieldContext = React.useContext(FormFieldContext)
        const itemContext = React.useContext(FormItemContext)
        const { getFieldState, formState } = useFormContext()

        if (!fieldContext) {
          throw new Error("useFormField should be used within <FormField>")
        }

        if (!itemContext) {
          throw new Error("useFormField should be used within <FormItem>")
        }

        const fieldState = getFieldState(fieldContext.name, formState)

        const { id } = itemContext

        return {
          id,
          name: fieldContext.name,
          formItemId: `${id}-form-item`,
          formDescriptionId: `${id}-form-item-description`,
          formMessageId: `${id}-form-item-message`,
          ...fieldState,
        }
      }


      type FormItemContextValue = {
        id: string
      }


      const FormItemContext = React.createContext<FormItemContextValue |
      null>(null)


      const FormItem = React.forwardRef<
        HTMLDivElement,
        React.HTMLAttributes<HTMLDivElement>
      >(({ className, ...props }, ref) => {
        const id = React.useId()

        return (
          <FormItemContext.Provider value={{ id }}>
            <div ref={ref} className={cn("space-y-2", className)} {...props} />
          </FormItemContext.Provider>
        )
      })

      FormItem.displayName = "FormItem"


      const FormLabel = React.forwardRef<
        React.ElementRef<typeof LabelPrimitive.Root>,
        React.ComponentPropsWithoutRef<typeof LabelPrimitive.Root>
      >(({ className, ...props }, ref) => {
        const { error, formItemId } = useFormField()

        return (
          <Label
            ref={ref}
            className={cn(error && "text-destructive", className)}
            htmlFor={formItemId}
            {...props}
          />
        )
      })

      FormLabel.displayName = "FormLabel"


      const FormControl = React.forwardRef<
        React.ElementRef<typeof Slot>,
        React.ComponentPropsWithoutRef<typeof Slot>
      >(({ ...props }, ref) => {
        const { error, formItemId, formDescriptionId, formMessageId } = useFormField()

        return (
          <Slot
            ref={ref}
            id={formItemId}
            aria-describedby={
              !error
                ? `${formDescriptionId}`
                : `${formDescriptionId} ${formMessageId}`
            }
            aria-invalid={!!error}
            {...props}
          />
        )
      })

      FormControl.displayName = "FormControl"


      const FormDescription = React.forwardRef<
        HTMLParagraphElement,
        React.HTMLAttributes<HTMLParagraphElement>
      >(({ className, ...props }, ref) => {
        const { formDescriptionId } = useFormField()

        return (
          <p
            ref={ref}
            id={formDescriptionId}
            className={cn("text-[0.8rem] text-muted-foreground", className)}
            {...props}
          />
        )
      })

      FormDescription.displayName = "FormDescription"


      const FormMessage = React.forwardRef<
        HTMLParagraphElement,
        React.HTMLAttributes<HTMLParagraphElement>
      >(({ className, children, ...props }, ref) => {
        const { error, formMessageId } = useFormField()
        const body = error ? String(error?.message ?? "") : children

        if (!body) {
          return null
        }

        return (
          <p
            ref={ref}
            id={formMessageId}
            className={cn("text-[0.8rem] font-medium text-destructive", className)}
            {...props}
          >
            {body}
          </p>
        )
      })

      FormMessage.displayName = "FormMessage"


      export {
        useFormField,
        Form,
        FormItem,
        FormLabel,
        FormControl,
        FormDescription,
        FormMessage,
        FormField,
      }

    actions/loadIndustryChallenges.ts: |
      import { action } from '@uibakery/data';

      function loadIndustryChallenges() {
        return action('loadIndustryChallenges', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ic.id,
              ic.title,
              ic.description,
              ic.budget_min,
              ic.budget_max,
              ic.timeline_months,
              ic.status,
              ic.created_at,
              cp.name as company_name,
              cp.industry,
              cp.location as company_location,
              ARRAY_AGG(ea.name) as required_expertise
            FROM industry_challenges ic
            JOIN corporate_partners cp ON ic.corporate_partner_id = cp.id
            LEFT JOIN industry_challenge_expertise ice ON ic.id = ice.industry_challenge_id
            LEFT JOIN expertise_areas ea ON ice.expertise_area_id = ea.id
            WHERE 
              ic.status = 'open'
              AND (COALESCE({{params.searchQuery}}, '') = '' OR ic.title ILIKE {{ '%' + params.searchQuery + '%' }})
            GROUP BY ic.id, cp.name, cp.industry, cp.location
            ORDER BY ic.created_at DESC;
          `,
        });
      }

      export default loadIndustryChallenges;
    actions/createIndustryChallenge.ts: |
      import { action } from '@uibakery/data';

      function createIndustryChallenge() {
        return action('createIndustryChallenge', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            INSERT INTO industry_challenges (
              corporate_partner_id,
              title,
              description,
              budget_min,
              budget_max,
              timeline_months,
              status
            ) VALUES (
              {{params.corporatePartnerId}}::int,
              {{params.title}},
              {{params.description}},
              {{params.budgetMin}}::numeric,
              {{params.budgetMax}}::numeric,
              {{params.timelineMonths}}::int,
              'open'
            ) RETURNING id;
          `,
        });
      }

      export default createIndustryChallenge;
    actions/loadMatchmakingScores.ts: |
      import { action } from '@uibakery/data';

      function loadMatchmakingScores() {
        return action('loadMatchmakingScores', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ms.id,
              ms.compatibility_score,
              ms.reasoning,
              rp.id as project_id,
              rp.title as project_title,
              rp.description as project_description,
              rp.trl_level,
              u.name as university_name,
              ic.id as challenge_id,
              ic.title as challenge_title,
              ic.description as challenge_description,
              cp.name as company_name,
              ARRAY_AGG(DISTINCT ea1.name) as project_expertise,
              ARRAY_AGG(DISTINCT ea2.name) as challenge_expertise
            FROM matchmaking_scores ms
            JOIN research_projects rp ON ms.research_project_id = rp.id
            JOIN universities u ON rp.university_id = u.id
            JOIN industry_challenges ic ON ms.industry_challenge_id = ic.id
            JOIN corporate_partners cp ON ic.corporate_partner_id = cp.id
            LEFT JOIN research_project_expertise rpe ON rp.id = rpe.research_project_id
            LEFT JOIN expertise_areas ea1 ON rpe.expertise_area_id = ea1.id
            LEFT JOIN industry_challenge_expertise ice ON ic.id = ice.industry_challenge_id
            LEFT JOIN expertise_areas ea2 ON ice.expertise_area_id = ea2.id
            WHERE ms.compatibility_score >= {{params.minScore}}::numeric
            GROUP BY ms.id, rp.id, u.name, ic.id, cp.name
            ORDER BY ms.compatibility_score DESC
            LIMIT 20;
          `,
        });
      }

      export default loadMatchmakingScores;
    actions/loadUniversities.ts: |
      import { action } from '@uibakery/data';

      function loadUniversities() {
        return action('loadUniversities', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              u.id,
              u.name,
              u.location,
              u.website,
              u.research_strengths,
              u.available_resources,
              u.success_rate,
              u.past_partnerships_count,
              COUNT(DISTINCT rp.id) as active_projects_count
            FROM universities u
            LEFT JOIN research_projects rp ON u.id = rp.university_id AND rp.status = 'active'
            WHERE COALESCE({{params.searchQuery}}, '') = '' OR u.name ILIKE {{ '%' + params.searchQuery + '%' }}
            GROUP BY u.id
            ORDER BY u.success_rate DESC;
          `,
        });
      }

      export default loadUniversities;
