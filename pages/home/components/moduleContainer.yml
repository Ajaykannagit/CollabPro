    components/IndustryChallengesBoard.tsx: >
      // Industry challenges board where corporate partners can post problems


      import { useState } from 'react';

      import { useLoadAction } from '@uibakery/data';

      import { Card, CardHeader, CardTitle, CardContent } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Badge } from '@/components/ui/badge';

      import loadIndustryChallengesAction from
      '@/actions/loadIndustryChallenges';

      import { Plus, Search, Building2, DollarSign, Clock } from 'lucide-react';

      import { CreateChallengeDialog } from
      '@/components/CreateChallengeDialog';

      import { formatINRCompact, usdToINR } from '@/lib/currency';


      type IndustryChallenge = {
        id: number;
        title: string;
        description: string;
        budget_min: number;
        budget_max: number;
        timeline_months: number;
        status: string;
        company_name: string;
        industry: string;
        company_location: string;
        required_expertise: string[];
        created_at: string;
      };


      export function IndustryChallengesBoard() {
        const [searchQuery, setSearchQuery] = useState('');
        const [showCreateDialog, setShowCreateDialog] = useState(false);
        const [challenges, loading, error, refresh] = useLoadAction(
          loadIndustryChallengesAction,
          [],
          { searchQuery: searchQuery || null }
        );

        const formatCurrency = (amount: number) => {
          return formatINRCompact(usdToINR(amount));
        };

        return (
          <div className="p-8">
            <div className="mb-6 flex items-center justify-between">
              <div>
                <h1 className="text-3xl font-bold text-gray-900 mb-2">Industry Challenges</h1>
                <p className="text-gray-600">Post problems and find research solutions</p>
              </div>
              <Button onClick={() => setShowCreateDialog(true)}>
                <Plus className="h-4 w-4 mr-2" />
                Post Challenge
              </Button>
            </div>

            {/* Search Bar */}
            <Card className="mb-6">
              <CardContent className="p-4">
                <div className="relative">
                  <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400" />
                  <input
                    type="text"
                    placeholder="Search challenges..."
                    className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </CardContent>
            </Card>

            {/* Challenges List */}
            {loading && (
              <div className="text-center py-12">
                <p className="text-gray-500">Loading challenges...</p>
              </div>
            )}

            {error && (
              <Card>
                <CardContent className="p-6">
                  <p className="text-red-600">Error: {error.message}</p>
                </CardContent>
              </Card>
            )}

            {!loading && !error && (
              <div className="space-y-4">
                {challenges.map((challenge: IndustryChallenge) => (
                  <Card key={challenge.id} className="hover:shadow-md transition-shadow">
                    <CardContent className="p-6">
                      <div className="flex items-start justify-between mb-3">
                        <div className="flex-1">
                          <h3 className="text-xl font-semibold text-gray-900 mb-2">
                            {challenge.title}
                          </h3>
                          <div className="flex items-center gap-3 text-sm text-gray-600 mb-3">
                            <div className="flex items-center gap-1">
                              <Building2 className="h-4 w-4" />
                              <span className="font-medium">{challenge.company_name}</span>
                            </div>
                            <span>•</span>
                            <span>{challenge.industry}</span>
                            <span>•</span>
                            <span>{challenge.company_location}</span>
                          </div>
                        </div>
                        <Badge variant="secondary">{challenge.status}</Badge>
                      </div>

                      <p className="text-gray-700 mb-4 leading-relaxed">
                        {challenge.description}
                      </p>

                      <div className="grid grid-cols-3 gap-4 mb-4 p-4 bg-gray-50 rounded-lg">
                        <div>
                          <div className="flex items-center gap-1 text-sm text-gray-600 mb-1">
                            <DollarSign className="h-3 w-3" />
                            <span>Budget Range</span>
                          </div>
                          <p className="font-semibold text-gray-900">
                            {formatCurrency(challenge.budget_min)} - {formatCurrency(challenge.budget_max)}
                          </p>
                        </div>
                        <div>
                          <div className="flex items-center gap-1 text-sm text-gray-600 mb-1">
                            <Clock className="h-3 w-3" />
                            <span>Timeline</span>
                          </div>
                          <p className="font-semibold text-gray-900">
                            {challenge.timeline_months} months
                          </p>
                        </div>
                        <div>
                          <p className="text-sm text-gray-600 mb-1">Posted</p>
                          <p className="font-semibold text-gray-900">
                            {new Date(challenge.created_at).toLocaleDateString()}
                          </p>
                        </div>
                      </div>

                      {challenge.required_expertise && challenge.required_expertise.length > 0 && (
                        <div className="mb-4">
                          <p className="text-sm font-medium text-gray-700 mb-2">Required Expertise:</p>
                          <div className="flex flex-wrap gap-2">
                            {challenge.required_expertise.map((expertise, idx) => (
                              <Badge key={idx} variant="outline">
                                {expertise}
                              </Badge>
                            ))}
                          </div>
                        </div>
                      )}

                      <Button variant="outline" size="sm">
                        View Matching Projects
                      </Button>
                    </CardContent>
                  </Card>
                ))}
              </div>
            )}

            {!loading && !error && challenges.length === 0 && (
              <Card>
                <CardContent className="p-12 text-center">
                  <Building2 className="h-12 w-12 text-gray-400 mx-auto mb-4" />
                  <h3 className="text-lg font-semibold text-gray-900 mb-2">No challenges found</h3>
                  <p className="text-gray-600 mb-4">Be the first to post an industry challenge</p>
                  <Button onClick={() => setShowCreateDialog(true)}>
                    <Plus className="h-4 w-4 mr-2" />
                    Post Challenge
                  </Button>
                </CardContent>
              </Card>
            )}

            {showCreateDialog && (
              <CreateChallengeDialog
                onClose={() => setShowCreateDialog(false)}
                onSuccess={() => {
                  setShowCreateDialog(false);
                  refresh();
                }}
              />
            )}
          </div>
        );
      }
    components/CreateChallengeDialog.tsx: >
      // Dialog for creating new industry challenges


      import { useState } from 'react';

      import { useMutateAction, useLoadAction } from '@uibakery/data';

      import { useForm } from 'react-hook-form';

      import { zodResolver } from '@hookform/resolvers/zod';

      import { z } from 'zod';

      import {
        Dialog,
        DialogContent,
        DialogHeader,
        DialogTitle,
        DialogDescription,
      } from '@/components/ui/dialog';

      import { Button } from '@/components/ui/button';

      import { Input } from '@/components/ui/input';

      import { Textarea } from '@/components/ui/textarea';

      import { Label } from '@/components/ui/label';

      import { Select, SelectContent, SelectItem, SelectTrigger, SelectValue }
      from '@/components/ui/select';

      import createIndustryChallengeAction from
      '@/actions/createIndustryChallenge';

      import loadCorporatePartnersAction from '@/actions/loadCorporatePartners';

      import { useToast } from '@/hooks/use-toast';

      import { Toaster } from '@/components/ui/toaster';


      const challengeSchema = z.object({
        title: z.string().min(5, 'Title must be at least 5 characters'),
        description: z.string().min(20, 'Description must be at least 20 characters'),
        budgetMin: z.string().min(1, 'Minimum budget is required'),
        budgetMax: z.string().min(1, 'Maximum budget is required'),
        timelineMonths: z.string().min(1, 'Timeline is required'),
        corporatePartnerId: z.string().min(1, 'Partner is required'),
      });


      type ChallengeFormData = z.infer<typeof challengeSchema>;


      type CreateChallengeDialogProps = {
        onClose: () => void;
        onSuccess: () => void;
      };


      export function CreateChallengeDialog({ onClose, onSuccess }:
      CreateChallengeDialogProps) {
        const [partners] = useLoadAction(loadCorporatePartnersAction, []);
        const [createChallenge, isSubmitting] = useMutateAction(createIndustryChallengeAction);
        const { toast } = useToast();

        const form = useForm<ChallengeFormData>({
          resolver: zodResolver(challengeSchema),
          defaultValues: {
            title: '',
            description: '',
            budgetMin: '',
            budgetMax: '',
            timelineMonths: '',
            corporatePartnerId: '',
          },
        });

        const onSubmit = async (data: ChallengeFormData) => {
          try {
            await createChallenge({
              title: data.title,
              description: data.description,
              budgetMin: parseFloat(data.budgetMin),
              budgetMax: parseFloat(data.budgetMax),
              timelineMonths: parseInt(data.timelineMonths),
              corporatePartnerId: parseInt(data.corporatePartnerId),
            });
            toast({
              title: 'Success',
              description: 'Industry challenge posted successfully',
            });
            onSuccess();
          } catch (error) {
            toast({
              title: 'Error',
              description: 'Failed to create challenge',
              variant: 'destructive',
            });
          }
        };

        return (
          <>
            <Dialog open onOpenChange={onClose}>
              <DialogContent className="max-w-2xl max-h-[90vh] overflow-auto">
                <DialogHeader>
                  <DialogTitle className="text-2xl">Post New Industry Challenge</DialogTitle>
                  <DialogDescription>
                    Describe your problem and find research partners to solve it
                  </DialogDescription>
                </DialogHeader>

                <form onSubmit={form.handleSubmit(onSubmit)} className="space-y-6">
                  <div className="grid gap-2">
                    <Label htmlFor="corporatePartnerId">Corporate Partner</Label>
                    <Select
                      value={form.watch('corporatePartnerId')}
                      onValueChange={(value) => form.setValue('corporatePartnerId', value)}
                    >
                      <SelectTrigger>
                        <SelectValue placeholder="Select partner" />
                      </SelectTrigger>
                      <SelectContent>
                        {partners.map((partner: any) => (
                          <SelectItem key={partner.id} value={String(partner.id)}>
                            {partner.name}
                          </SelectItem>
                        ))}
                      </SelectContent>
                    </Select>
                    {form.formState.errors.corporatePartnerId && (
                      <p className="text-sm text-red-600">
                        {form.formState.errors.corporatePartnerId.message}
                      </p>
                    )}
                  </div>

                  <div className="grid gap-2">
                    <Label htmlFor="title">Challenge Title</Label>
                    <Input
                      id="title"
                      placeholder="e.g., Predictive Maintenance for High-Speed Rail"
                      {...form.register('title')}
                    />
                    {form.formState.errors.title && (
                      <p className="text-sm text-red-600">{form.formState.errors.title.message}</p>
                    )}
                  </div>

                  <div className="grid gap-2">
                    <Label htmlFor="description">Description</Label>
                    <Textarea
                      id="description"
                      placeholder="Describe the problem you need solved..."
                      rows={6}
                      {...form.register('description')}
                    />
                    {form.formState.errors.description && (
                      <p className="text-sm text-red-600">
                        {form.formState.errors.description.message}
                      </p>
                    )}
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="grid gap-2">
                      <Label htmlFor="budgetMin">Minimum Budget ($)</Label>
                      <Input
                        id="budgetMin"
                        type="number"
                        placeholder="500000"
                        {...form.register('budgetMin')}
                      />
                      {form.formState.errors.budgetMin && (
                        <p className="text-sm text-red-600">
                          {form.formState.errors.budgetMin.message}
                        </p>
                      )}
                    </div>

                    <div className="grid gap-2">
                      <Label htmlFor="budgetMax">Maximum Budget ($)</Label>
                      <Input
                        id="budgetMax"
                        type="number"
                        placeholder="1000000"
                        {...form.register('budgetMax')}
                      />
                      {form.formState.errors.budgetMax && (
                        <p className="text-sm text-red-600">
                          {form.formState.errors.budgetMax.message}
                        </p>
                      )}
                    </div>
                  </div>

                  <div className="grid gap-2">
                    <Label htmlFor="timelineMonths">Timeline (months)</Label>
                    <Input
                      id="timelineMonths"
                      type="number"
                      placeholder="24"
                      {...form.register('timelineMonths')}
                    />
                    {form.formState.errors.timelineMonths && (
                      <p className="text-sm text-red-600">
