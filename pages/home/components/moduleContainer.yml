          datasourceName: 'collabsync_pro_db',
          query: `
            INSERT INTO saved_candidates (
              corporate_partner_id,
              student_profile_id,
              notes,
              interest_level
            ) VALUES (
              {{params.corporatePartnerId}}::int,
              {{params.studentProfileId}}::int,
              {{params.notes}},
