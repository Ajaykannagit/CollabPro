      export default createNegotiationMessage;
    actions/loadAgreementDetails.ts: |
      import { action } from '@uibakery/data';

      function loadAgreementDetails() {
        return action('loadAgreementDetails', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              ca.*,
              cr.project_brief,
              rp.title as project_title,
              u.name as university_name,
              cp.name as company_name
            FROM collaboration_agreements ca
            JOIN collaboration_requests cr ON ca.collaboration_request_id = cr.id
            LEFT JOIN research_projects rp ON cr.research_project_id = rp.id
            LEFT JOIN universities u ON rp.university_id = u.id
            JOIN corporate_partners cp ON cr.corporate_partner_id = cp.id
            WHERE ca.collaboration_request_id = {{params.collaborationRequestId}}::int;
          `,
        });
      }

      export default loadAgreementDetails;
    actions/loadSavedCandidates.ts: |
      import { action } from '@uibakery/data';

      function loadSavedCandidates() {
        return action('loadSavedCandidates', 'SQL', {
          datasourceName: 'collabsync_pro_db',
          query: `
            SELECT 
              sc.id as saved_id,
              sc.notes,
              sc.interest_level,
              sc.created_at as saved_at,
              sp.id,
              sp.name,
              sp.email,
              sp.degree_level,
              sp.field_of_study,
              sp.graduation_year,
              sp.gpa,
              sp.bio,
              u.name as university_name,
              ARRAY_AGG(DISTINCT ss.skill_name) FILTER (WHERE ss.skill_name IS NOT NULL) as skills
            FROM saved_candidates sc
            JOIN student_profiles sp ON sc.student_profile_id = sp.id
            JOIN universities u ON sp.university_id = u.id
            LEFT JOIN student_skills ss ON sp.id = ss.student_profile_id
            WHERE sc.corporate_partner_id = {{params.corporatePartnerId}}::int
            GROUP BY sc.id, sp.id, u.name
            ORDER BY sc.created_at DESC;
          `,
        });
      }

      export default loadSavedCandidates;
    actions/saveCandidateInterest.ts: |
